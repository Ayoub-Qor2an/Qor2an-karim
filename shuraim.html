<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سعود الشريم - المصحف المرتل</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .surah-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        audio { width: 180px; height: 30px; }
        .btn-back { display: block; margin-bottom: 20px; text-decoration: none; color: #2d5a27; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back">← العودة للرئيسية</a>
    <h1>الشيخ سعود الشريم</h1>
    
    <!-- سورة الفاتحة -->
    <div class="surah-card">
        <span>1. سورة الفاتحة</span>
        <audio controls preload="none">
            <source src="https://server7.mp3quran.net" type="audio/mpeg">
        </audio>
    </div>

    <!-- سورة البقرة -->
    <div class="surah-card">
        <span>2. سورة البقرة</span>
        <audio controls preload="none">
            <source src="https://server7.mp3quran.net" type="audio/mpeg">
        </audio>
    </div>

    <!-- سورة آل عمران -->
    <div class="surah-card">
        <span>3. سورة آل عمران</span>
        <audio controls preload="none">
            <source src="https://server7.mp3quran.net" type="audio/mpeg">
        </audio>
    </div>

</div>

</body>
</html>
