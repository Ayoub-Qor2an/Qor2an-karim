<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع القراء - استماع مباشر</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; margin: 0; padding: 40px 20px; text-align: center; }
        h1 { color: #2d5a27; margin-bottom: 30px; }
        
        /* هذا هو الكود المسؤول عن جعل الخانات بجانب بعضها */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* توزيع تلقائي للخانات */
            gap: 20px; /* المسافة بين الخانات */
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 5px solid #2d5a27;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); }

        h3 { color: #333; margin: 10px 0; }
        p { color: #666; font-size: 14px; }
        
        .btn {
            display: inline-block;
            background-color: #2d5a27;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>قائمة القراء والمصاحف</h1>

    <div class="grid-container">
        
        <!-- الخانة الأولى: سعود الشريم -->
        <div class="card">
            <h3>الشيخ سعود الشريم</h3>
            <p>المصحف المرتل - رواية حفص</p>
            <a href="shuraim.html" class="btn">دخول للاستماع ←</a>
        </div>

        <!-- الخانة الثانية: قارئ آخر (مثال) -->
        <div class="card">
            <h3>الشيخ ماهر المعيقلي</h3>
            <p>تلاوات خاشعة من الحرم</p>
            <a href="#" class="btn">قريباً..</a>
        </div>

        <!-- الخانة الثالثة: قارئ آخر (مثال) -->
        <div class="card">
            <h3>الشيخ عبد الباسط</h3>
            <p>المصحف المجود والنادر</p>
            <a href="#" class="btn">قريباً..</a>
        </div>

    </div>

</body>
</html>
