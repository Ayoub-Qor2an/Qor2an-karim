<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المصحف الكامل - سعود الشريم</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #2d5a27; margin-bottom: 5px; }
        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #666; font-size: 14px; background: #eee; padding: 5px 15px; border-radius: 50px; }
        .surah-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 30px; }
        .surah-card { display: flex; flex-direction: column; align-items: center; padding: 15px; border: 1px solid #f0f0f0; border-radius: 15px; background: #fff; transition: 0.3s; }
        .surah-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-color: #2d5a27; }
        .surah-name { font-weight: bold; margin-bottom: 10px; color: #333; font-size: 18px; }
        audio { width: 100%; height: 35px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back">← العودة للرئيسية</a>
    <h1>الشيخ سعود الشريم</h1>
    <p style="color: #666;">رواية حفص عن عاصم - المصحف المرتل</p>
    
    <div id="surahContainer" class="surah-list">
        <p>جاري تحميل المصحف الشريف...</p>
    </div>
</div>

<script>
    // رابط السيرفر المباشر للشيخ سعود الشريم
    const serverUrl = "https://server7.mp3quran.net";
    
    // دالة لجلب السور من API موقع mp3quran
    async function loadSurahs() {
        try {
            // جلب أسماء السور باللغة العربية
            const response = await fetch("https://mp3quran.net");
            const data = await response.json();
            const suwar = data.suwar;

            const container = document.getElementById('surahContainer');
            container.innerHTML = ''; // مسح رسالة التحميل

            suwar.forEach(surah => {
                // تحويل رقم السورة إلى 3 أرقام (مثلاً 1 يصبح 001)
                const surahId = surah.id.toString().padStart(3, '0');
                
                const div = document.createElement('div');
                div.className = 'surah-card';
                div.innerHTML = `
                    <span class="surah-name">${surah.name}</span>
                    <audio controls preload="none">
                        <source src="${serverUrl}${surahId}.mp3" type="audio/mpeg">
                        متصفحك لا يدعم تشغيل الصوت.
                    </audio>
                `;
                container.appendChild(div);
            });
        } catch (error) {
            document.getElementById('surahContainer').innerHTML = "<p>عذراً، فشل تحميل السور. تأكد من اتصال الإنترنت.</p>";
        }
    }

    // تشغيل الدالة عند فتح الصفحة
    loadSurahs();
</script>

</body>
</html>
