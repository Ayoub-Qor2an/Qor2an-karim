<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>تلاوات سعود الشريم - المصحف الكامل</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; padding-bottom: 120px; }
        h1 { color: #ffd700; margin-bottom: 5px; }
        .back-link { color: #bbb; text-decoration: none; margin-bottom: 20px; font-size: 0.9rem; }
        
        .surah-list { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 8px; }
        
        .surah-item { 
            background-color: #1e1e1e; padding: 12px 20px; border-radius: 8px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid #333; cursor: pointer; transition: 0.2s; 
        }
        .surah-item:hover { background-color: #252525; border-color: #ffd700; transform: scale(1.01); }
        .surah-name { font-weight: bold; }
        .play-icon { color: #ffd700; }

        /* مشغل الصوت الثابت */
        .player-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: #1e1e1e; border-top: 2px solid #ffd700;
            padding: 15px; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        audio { width: 90%; max-width: 500px; height: 40px; margin-top: 10px; }
        #current-info { color: #ffd700; font-size: 1rem; font-weight: bold; }
    </style>
</head>
