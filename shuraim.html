
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تلاوات القارئ سعود الشريم</title>
    <style>
        /* الحفاظ على نفس تصميم الوضع المظلم من الصفحة الرئيسية */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ffd700;
            margin-bottom: 10px;
        }

        .back-link {
            color: #bbb;
            text-decoration: none;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #ffd700;
        }

        /* قائمة السور */
        .surah-list {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .surah-item {
            background-color: #1e1e1e;
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .surah-item:hover {
            background-color: #252525;
            border-color: #ffd700;
        }

        .play-icon {
            color: #ffd700;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <h1>القارئ سعود الشريم</h1>
    <a href="index.html" class="back-link">⬅ العودة للقائمة الرئيسية</a>

    <div class="surah-list">
        <!-- نموذج لقائمة السور -->
        <a href="#" class="surah-item">
            <span>1. سورة الفاتحة</span>
            <span class="play-icon">▶</span>
        </a>

        <a href="#" class="surah-item">
            <span>2. سورة البقرة</span>
            <span class="play-icon">▶</span>
        </a>

        <a href="#" class="surah-item">
            <span>18. سورة الكهف</span>
            <span class="play-icon">▶</span>
        </a>
        
        <a href="#" class="surah-item">
            <span>36. سورة يس</span>
            <span class="play-icon">▶</span>
        </a>
    </div>

</body>
</html>
