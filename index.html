<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشغل موسيقى احترافي</title>
    <style>
        /* تصميم الواجهة - CSS */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .album-art {
            width: 150px;
            height: 150px;
            background: #ff4757;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h2 { margin: 10px 0 5px; font-size: 22px; }
        p { color: #aaa; margin-bottom: 25px; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        button {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { color: #ff4757; transform: scale(1.2); }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #ff4757;
            border-radius: 10px;
        }

        .volume-slider {
            width: 80%;
            accent-color: #ff4757;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="album-art">🎵</div>
        <h2 id="title">اسم الأغنية</h2>
        <p id="artist">اسم الفنان</p>

        <!-- مسار ملف الصوت - ضع رابط ملفك هنا -->
        <audio id="audio" src="https://www.soundhelix.com"></audio>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>

        <div class="controls">
            <button id="prev">⏮</button>
            <button id="play" style="font-size: 40px;">▶</button>
            <button id="next">⏭</button>
        </div>

        <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.1" value="1">
        <div style="font-size: 12px; margin-top: 5px; color: #888;">التحكم في الصوت</div>
    </div>

    <script>
        // برمجة المشغل - JavaScript
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play');
        const progress = document.getElementById('progress');
        const progressContainer = document.getElementById('progress-container');
        const volumeSlider = document.getElementById('volume');

        let isPlaying = false;

        function playSong() {
            isPlaying = true;
            playBtn.innerText = '⏸';
            audio.play();
        }

        function pauseSong() {
            isPlaying = false;
            playBtn.innerText = '▶';
            audio.pause();
        }

        playBtn.addEventListener('click', () => (isPlaying ? pauseSong() : playSong()));

        audio.addEventListener('timeupdate', (e) => {
            const { duration, currentTime } = e.srcElement;
            const progressPercent = (currentTime / duration) * 100;
            progress.style.width = ${progressPercent}%;
        });

        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });
    </script>
