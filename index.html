<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع القرآن الكريم</title>
    <style>
        /* إعدادات الوضع المظلم */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ffd700; /* لون ذهبي للعنوان */
            margin-bottom: 40px;
            font-size: 2.5rem;
        }

        /* شبكة القراء */
        .readers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* خانة القارئ */
        .reader-card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #333;
            transition: transform 0.3s, background-color 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .reader-card:hover {
            background-color: #252525;
            transform: translateY(-5px);
            border-color: #ffd700;
        }

        .reader-card i {
            display: block;
            margin-bottom: 10px;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <h1>موقع القرآن الكريم</h1>

    <div class="readers-grid">
        <!-- يمكنك تكرار هذه الخانة لكل قارئ -->
        <a href="shuraim.html" class="reader-card">
            <div>سعود الشريم</div>
        </a>
        
        <a href="#" class="reader-card">
            <div>عبد الباسط عبد الصمد</div>
        </a>

        <a href="#" class="reader-card">
            <div>ماهر المعيقلي</div>
        </a>

        <a href="#" class="reader-card">
            <div>مشاري العفاسي</div>
        </a>

        <a href="#" class="reader-card">
            <div>ياسر الدوسري</div>
        </a>

        <a href="#" class="reader-card">
            <div>سعد الغامدي</div>
        </a>
    </div>

</body>
</html>
